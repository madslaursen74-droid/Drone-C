[platformio]
default_envs = Nav

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200



lib_deps =
  adafruit/Adafruit SSD1306@^2.5.9
  adafruit/Adafruit GFX Library@^1.11.9
  mikalhart/TinyGPSPlus



[env:Data]
build_src_filter = +<*> -<Drone_Data.cpp>

[env:Nav]
build_src_filter = +<*> -<Drone_Nav.cpp>