[platformio]
default_envs = Nav

[env]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200



lib_deps =
  adafruit/Adafruit SSD1306@^2.5.9
  adafruit/Adafruit GFX Library@^1.11.9
  mikalhart/TinyGPSPlus
  adafruit/Adafruit BNO055
  adafruit/Adafruit Unified Sensor
  madhephaestus/ESP32Servo@^3.0.8


[env:Nav]
build_src_filter = +<Drone_Nav.cpp>

[env:AutoNav]
build_src_filter = +<Drone_AutoNav.cpp>

[env:EscTest]
build_src_filter = +<Drone_EscTest.cpp>

[env:Data]
build_src_filter = +<Drone_Data.cpp>
